<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          var hasSession = false;
          for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > -1) {
              hasSession = true;
              break;
            }
          }
          if (!hasSession) {
            document.documentElement.className += ' no-session-shell';
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dopzy — Connect with vetted, trusted service providers in your area. Post tasks, get offers, get things done." />
    <meta name="theme-color" content="#002E3C" />
    <title>Dopzy — Your Tasks, Done</title>

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://ggjdbiojqtlcparrphfp.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font: loaded as <link> with display=swap instead of CSS @import to avoid render-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" /></noscript>

    <!-- Inline critical CSS for loading shell -->
    <style>
      /* Reset defaults to avoid layout shift (CLS) */
      html, body {
        margin: 0;
        padding: 0;
        background: #fbf9f7;
      }
      /* Hide sidebar on load if guest user */
      .no-session-shell .loading-shell-sidebar {
        display: none !important;
      }
      /* Loading shell — shown before React hydrates */
      .loading-shell {
        display: flex;
        min-height: 100vh;
        background: #fbf9f7;
        font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
        color: #1b1c1b;
      }
      .loading-shell-sidebar {
        width: 270px;
        background: #002E3C;
        border-right: 1px solid rgba(255,255,255,0.08);
        display: flex;
        flex-direction: column;
        height: 100vh;
        flex-shrink: 0;
      }
      .loading-shell-logo {
        padding: 0 20px;
        height: 88px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .loading-shell-logo-text {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
      }
      .loading-shell-logo-title {
        font-weight: 700;
        font-size: 18px;
        color: #ffffff;
        line-height: 1.2;
        letter-spacing: -0.01em;
      }
      .loading-shell-logo-sub {
        font-size: 11px;
        color: rgba(255,255,255,0.45);
        margin-top: 3px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        line-height: 1.2;
      }
      .loading-shell-user {
        padding: 14px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .loading-shell-user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid rgba(255,215,0,0.35);
        background: rgba(255,255,255,0.1);
        padding: 2px;
        flex-shrink: 0;
      }
      .loading-shell-user-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
        flex: 1;
      }
      .loading-shell-line-sm, .loading-shell-line-xs {
        height: 12px;
        border-radius: 4px;
        background: rgba(255,255,255,0.15);
      }
      .loading-shell-line-xs {
        height: 10px;
        background: rgba(255,255,255,0.08);
      }
      .loading-shell-nav {
        flex: 1;
        overflow-y: auto;
        padding: 12px 12px;
      }
      .loading-shell-nav-label {
        font-size: 10px;
        font-weight: 600;
        color: rgba(255,215,0,0.55);
        text-transform: uppercase;
        letter-spacing: 0.10em;
        padding: 8px 10px 6px;
      }
      .loading-shell-nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 4px;
        margin-bottom: 2px;
        border-left: 3px solid transparent;
      }
      .loading-shell-nav-item.active {
        background: rgba(255,215,0,0.12);
        border-left: 3px solid #FFD700;
      }
      .loading-shell-nav-item.active .loading-shell-line-sm {
        background: #FFD700;
        opacity: 0.85;
      }
      .loading-shell-nav-icon {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        background: rgba(255,255,255,0.15);
        flex-shrink: 0;
      }
      .loading-shell-nav-divider {
        height: 1px;
        background: rgba(255,255,255,0.08);
        margin: 10px 4px;
      }
      .loading-shell-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }
      .loading-shell-topbar {
        height: 73px;
        background: #ffffff;
        border-bottom: 1px solid #d0c6ab;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        box-sizing: border-box;
      }
      .loading-shell-content {
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .loading-shell-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .loading-shell-card {
        height: 180px;
        background: #ffffff;
        border-radius: 8px;
        border: 1px solid #d0c6ab;
        overflow: hidden;
        position: relative;
      }
      .loading-shell-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);
        animation: shimmer 1.5s ease-in-out infinite;
      }
      .loading-shell-stat-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }
      .loading-shell-stat {
        height: 90px;
        background: #ffffff;
        border-radius: 8px;
        border: 1px solid #d0c6ab;
        position: relative;
        overflow: hidden;
      }
      .loading-shell-stat::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);
        animation: shimmer 1.5s ease-in-out infinite;
        animation-delay: 0.3s;
      }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      /* Hide sidebar on mobile */
      @media (max-width: 767px) {
        .loading-shell-sidebar { display: none; }
        .loading-shell-cards { grid-template-columns: 1fr; }
        .loading-shell-stat-row { grid-template-columns: repeat(2, 1fr); }
        .loading-shell-content { padding: 16px; }
      }
      @media (max-width: 1024px) and (min-width: 768px) {
        .loading-shell-cards { grid-template-columns: repeat(2, 1fr); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Inline loading shell — visible until React hydrates -->
      <div class="loading-shell" aria-hidden="true">
        <div class="loading-shell-sidebar">
          <div class="loading-shell-logo">
            <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius: var(--radius-lg, 8px); flex-shrink: 0;">
              <rect width="100" height="100" rx="16" fill="#004352"/>
              <path d="M30 50L45 65L75 35" stroke="#FFE600" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M25 25L40 25" stroke="#FFE600" stroke-width="4" stroke-linecap="round"/>
              <path d="M25 75L40 75" stroke="#FFE600" stroke-width="4" stroke-linecap="round"/>
            </svg>
            <div class="loading-shell-logo-text">
              <div class="loading-shell-logo-title">Dopzy</div>
              <div class="loading-shell-logo-sub">One Tap, Task Done</div>
            </div>
          </div>
          <div class="loading-shell-user">
            <div class="loading-shell-user-avatar"></div>
            <div class="loading-shell-user-info">
              <div class="loading-shell-line-sm" style="width: 80px;"></div>
              <div class="loading-shell-line-xs" style="width: 50px; margin-top: 4px;"></div>
            </div>
          </div>
          <div class="loading-shell-nav">
            <div class="loading-shell-nav-label">Workspace</div>
            <div class="loading-shell-nav-item active">
              <div class="loading-shell-nav-icon"></div>
              <div class="loading-shell-line-sm" style="width: 100px;"></div>
            </div>
            <div class="loading-shell-nav-item">
              <div class="loading-shell-nav-icon"></div>
              <div class="loading-shell-line-sm" style="width: 85px;"></div>
            </div>
            <div class="loading-shell-nav-item">
              <div class="loading-shell-nav-icon"></div>
              <div class="loading-shell-line-sm" style="width: 75px;"></div>
            </div>
            <div class="loading-shell-nav-divider"></div>
            <div class="loading-shell-nav-label">Account</div>
            <div class="loading-shell-nav-item">
              <div class="loading-shell-nav-icon"></div>
              <div class="loading-shell-line-sm" style="width: 80px;"></div>
            </div>
            <div class="loading-shell-nav-item">
              <div class="loading-shell-nav-icon"></div>
              <div class="loading-shell-line-sm" style="width: 110px;"></div>
            </div>
            <div class="loading-shell-nav-item">
              <div class="loading-shell-nav-icon"></div>
              <div class="loading-shell-line-sm" style="width: 90px;"></div>
            </div>
          </div>
        </div>
        <div class="loading-shell-main">
          <div class="loading-shell-topbar">
            <div class="loading-shell-line-sm" style="width: 140px; background: #efedeb; height: 16px;"></div>
            <div class="loading-shell-btn" style="width: 100px; height: 36px; border-radius: 9999px; background: #efedeb;"></div>
          </div>
          <div class="loading-shell-content">
            <div class="loading-shell-stat-row">
              <div class="loading-shell-stat"></div>
              <div class="loading-shell-stat"></div>
              <div class="loading-shell-stat"></div>
              <div class="loading-shell-stat"></div>
            </div>
            <div class="loading-shell-cards">
              <div class="loading-shell-card"></div>
              <div class="loading-shell-card"></div>
              <div class="loading-shell-card"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
